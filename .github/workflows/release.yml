name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release
        working-directory: rust

      - name: Package artifact
        run: |
          cd rust/target/release
          PKG_NAME="webdav_backup-${{ github.ref_name }}-linux-amd64"
          zip -j "../../../${PKG_NAME}.zip" "webdav_backup"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webdav_backup-${{ github.ref_name }}-linux-amd64
          path: rust/webdav_backup-${{ github.ref_name }}-linux-amd64.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
