[global]
# 全局 ZIP 解压密码，不设置则不加密
zip_password = "global-secret"
# 全局保留数量，0 表示不删除旧备份
retain_count = 5
# 日志级别: trace, debug, info, warn, error
log_level = "info"

[[source]]
name = "nas"
url = "https://nas.example.com/dav"
username = "backup_user"
password = "backup_pass"
# 该源下的默认远程子目录
sub_dir = "backups"
# 该源专属的 ZIP 密码（覆盖全局）
# zip_password = "nas-secret"
# 该源专属的保留数量（覆盖全局）
# retain_count = 3

[[source]]
name = "cloud"
url = "https://cloud.example.com/dav"
username = "cloud_user"
password = "cloud_pass"

[[project]]
name = "documents"
source = "nas"
# 项目级远程子目录（覆盖源的 sub_dir）
# sub_dir = "docs"
# 项目级 ZIP 密码（覆盖源的密码）
# zip_password = "doc-secret"
# 项目级保留数量（覆盖源的保留数量）
retain_count = 3

[project.file]
local_path = "D:\\Documents"
# 排除规则，空格分隔的 glob 模式（类似 .gitignore）
exclude = "node_modules target *.tmp Thumbs.db"

[[project]]
name = "blog_db"
source = "cloud"

[project.mysql]
host = "localhost"
port = 3306
username = "root"
password = "db_password"
database = "blog"
# * 表示所有表，或指定空格分隔的表名
tables = "*"
# ssl_mode = "REQUIRED"

[[project]]
name = "analytics_db"
source = "nas"

[project.pgsql]
host = "localhost"
port = 5432
username = "postgres"
password = "db_password"
database = "analytics"
tables = "*"
# ssl_mode = "require"
